name = "taiwan-fin-hub"
main = "apps/worker/src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = true
preview_urls = false

assets = { directory = "apps/web/dist", binding = "ASSETS" }
browser = { binding = "BROWSER" }

[triggers]
crons = ["*/10 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "taiwan-fin-hub"
# database_id is intentionally omitted from this public configuration.
# Cloudflare automatically provisions or resolves the D1 binding on deploy.
migrations_dir = "packages/db/migrations"

name: Sync upstream daily

on:
  schedule:
    # 每天台灣時間 03:17（UTC 前一天 19:17）
    - cron: "17 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest upstream changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/kevchentw/taiwan-fin-hub.git \
            || git remote set-url upstream https://github.com/kevchentw/taiwan-fin-hub.git
          git fetch upstream main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date with upstream."
            exit 0
          fi

          git merge --no-edit upstream/main
          git push origin HEAD:main
